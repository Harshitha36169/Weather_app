<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherNow - Get Started</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <div class="glass-card text-center">
            <div class="logo-large">
                <i data-lucide="cloud-sun" style="width: 80px; height: 80px; color: var(--primary);"></i>
            </div>
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">WeatherNow</h1>
            <p style="color: var(--text-secondary); margin-bottom: 40px;">Your ultimate weather companion. Get real-time updates and accurate forecasts.</p>
            
            <div class="auth-buttons">
                <a href="{{ url_for('login') }}" class="btn primary-btn">Login</a>
                <a href="{{ url_for('signup') }}" class="btn secondary-btn">Sign Up</a>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
