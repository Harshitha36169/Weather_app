<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WeatherNow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <a href="{{ url_for('landing') }}" class="back-btn"><i data-lucide="arrow-left"></i></a>
            <h2 style="margin: 20px 0;">Login</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn primary-btn full-width">Login</button>
            </form>
            <p style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
                Don't have an account? <a href="{{ url_for('signup') }}" style="color: var(--primary);">Sign Up</a>
            </p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
